<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>microdb Capacity Estimator</title>
  <style>
    :root {
      --bg: #f4f6f0;
      --panel: #ffffff;
      --line: #d5d9c8;
      --text: #1f2a1f;
      --muted: #5a6656;
      --accent: #2f6f4f;
      --warn: #9f3e1f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 0%, #e8f1da 0%, transparent 35%),
        radial-gradient(circle at 85% 5%, #d7e5ff 0%, transparent 30%),
        linear-gradient(160deg, #eef3e4 0%, #eaf0e3 40%, #e5ece0 100%);
    }
    .wrap {
      max-width: 1240px;
      margin: 24px auto;
      padding: 0 14px 24px;
      display: grid;
      gap: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(33, 44, 34, 0.06);
    }
    h1, h2 { margin: 0 0 8px; }
    h1 { font-size: 26px; }
    h2 { font-size: 18px; }
    .muted { color: var(--muted); margin: 4px 0 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f9fbf4;
      padding: 10px;
    }
    .k { font-size: 12px; color: var(--muted); }
    .v { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #f4f7ef;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
    }
    .warn {
      color: var(--warn);
      font-weight: 700;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>microdb Capacity Estimator</h1>
      <p class="muted">Model follows <code>src/microdb.c</code>, <code>src/microdb_kv.c</code>, <code>src/microdb_ts.c</code>, <code>src/microdb_rel.c</code>, <code>src/microdb_wal.c</code>.</p>
      <div class="grid">
        <div>
          <label>Preset</label>
          <select id="preset">
            <option value="FOOTPRINT_MIN">FOOTPRINT_MIN (8KB)</option>
            <option value="CORE_MIN">CORE_MIN (32KB)</option>
            <option value="CORE_WAL" selected>CORE_WAL (32KB)</option>
            <option value="CORE_PERF">CORE_PERF (64KB)</option>
            <option value="CORE_HIMEM">CORE_HIMEM (128KB)</option>
            <option value="CUSTOM">Custom</option>
          </select>
        </div>
        <div>
          <label>Platform ABI</label>
          <select id="ptrBits">
            <option value="32">32-bit</option>
            <option value="64" selected>64-bit</option>
          </select>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="panel">
        <h2>RAM Inputs</h2>
        <div class="grid">
          <div><label>RAM KB</label><input id="ramKb" type="range" min="8" max="1024" value="32"><input id="ramKbNum" type="number" min="8" max="1024" value="32"></div>
          <div><label>KV %</label><input id="kvPct" type="range" min="1" max="98" value="40"><input id="kvPctNum" type="number" min="1" max="98" value="40"></div>
          <div><label>TS %</label><input id="tsPct" type="range" min="1" max="98" value="40"><input id="tsPctNum" type="number" min="1" max="98" value="40"></div>
          <div><label>REL % (auto)</label><input id="relPctNum" type="number" readonly value="20"></div>
          <div><label>KV max keys</label><input id="kvMaxKeys" type="number" min="1" value="64"></div>
          <div><label>KV key max len</label><input id="kvKeyMaxLen" type="number" min="4" value="32"></div>
          <div><label>KV val max len</label><input id="kvValMaxLen" type="number" min="1" value="128"></div>
          <div><label>TXN stage keys</label><input id="txnStageKeys" type="number" min="1" value="8"></div>
          <div><label>TS max streams</label><input id="tsMaxStreams" type="number" min="1" value="8"></div>
          <div><label>TS stream name len</label><input id="tsNameLen" type="number" min="4" value="16"></div>
          <div><label>REL max tables</label><input id="relMaxTables" type="number" min="1" value="4"></div>
          <div><label>REL max cols</label><input id="relMaxCols" type="number" min="1" value="16"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Storage Inputs</h2>
        <div class="grid">
          <div><label>Storage enabled</label><select id="storageEnabled"><option value="0" selected>off</option><option value="1">on</option></select></div>
          <div><label>Flash capacity KB</label><input id="flashKb" type="range" min="64" max="4096" value="512"><input id="flashKbNum" type="number" min="64" max="4096" value="512"></div>
          <div><label>Erase block size</label><select id="eraseSize"><option>512</option><option>1024</option><option>2048</option><option selected>4096</option><option>65536</option></select></div>
          <div><label>WAL enabled</label><select id="walEnabled"><option value="1" selected>on</option><option value="0">off</option></select></div>
          <div><label>WAL compact threshold %</label><input id="walThreshold" type="range" min="50" max="95" value="75"><input id="walThresholdNum" type="number" min="50" max="95" value="75"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Usage Profile</h2>
        <div class="grid">
          <div><label>KV ops/hour</label><input id="kvOpsHr" type="number" min="0" value="100"></div>
          <div><label>TS inserts/hour total</label><input id="tsOpsHr" type="number" min="0" value="1000"></div>
          <div><label>REL inserts/hour</label><input id="relOpsHr" type="number" min="0" value="10"></div>
          <div><label>Flash endurance P/E cycles</label><select id="peCycles"><option>10000</option><option>50000</option><option selected>100000</option></select></div>
          <div><label>Target lifetime years</label><select id="targetYears"><option>1</option><option>5</option><option>10</option><option selected>20</option></select></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>RAM Breakdown (matches microdb_init)</h2>
      <div class="cards" id="ramCards"></div>
      <div class="mono" id="ramDetail"></div>
    </div>

    <div class="panel">
      <h2>KV / TS Capacity</h2>
      <div class="cards" id="capCards"></div>
    </div>

    <div class="panel">
      <h2>Storage Layout / Wear</h2>
      <div class="cards" id="storageCards"></div>
      <div class="warn" id="lifetimeWarn"></div>
    </div>

    <div class="panel">
      <h2>CMake Defines</h2>
      <div class="mono" id="cmakeOut"></div>
    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const fmt = (n) => Number(n).toLocaleString("en-US");
    const f2 = (n) => Number.isFinite(n) ? n.toFixed(2) : "0.00";

    const profiles = {
      FOOTPRINT_MIN: { ramKb: 8, kvPct: 40, tsPct: 40, kvMaxKeys: 16, kvKeyMaxLen: 16, kvValMaxLen: 64, txnStageKeys: 2, tsMaxStreams: 1, tsNameLen: 16, relMaxTables: 1, relMaxCols: 1 },
      CORE_MIN:      { ramKb: 32, kvPct: 40, tsPct: 40, kvMaxKeys: 48, kvKeyMaxLen: 32, kvValMaxLen: 128, txnStageKeys: 8, tsMaxStreams: 4, tsNameLen: 16, relMaxTables: 2, relMaxCols: 8 },
      CORE_WAL:      { ramKb: 32, kvPct: 40, tsPct: 40, kvMaxKeys: 64, kvKeyMaxLen: 32, kvValMaxLen: 128, txnStageKeys: 8, tsMaxStreams: 8, tsNameLen: 16, relMaxTables: 4, relMaxCols: 16 },
      CORE_PERF:     { ramKb: 64, kvPct: 40, tsPct: 40, kvMaxKeys: 128, kvKeyMaxLen: 32, kvValMaxLen: 128, txnStageKeys: 8, tsMaxStreams: 8, tsNameLen: 16, relMaxTables: 4, relMaxCols: 16 },
      CORE_HIMEM:    { ramKb: 128, kvPct: 40, tsPct: 40, kvMaxKeys: 256, kvKeyMaxLen: 32, kvValMaxLen: 128, txnStageKeys: 8, tsMaxStreams: 8, tsNameLen: 16, relMaxTables: 4, relMaxCols: 16 }
    };

    function align(v, a) { return Math.ceil(v / a) * a; }

    function syncPair(rangeId, numId) {
      const r = el(rangeId);
      const n = el(numId);
      r.addEventListener("input", () => { n.value = r.value; update(); });
      n.addEventListener("input", () => { r.value = n.value; update(); });
    }

    syncPair("ramKb", "ramKbNum");
    syncPair("kvPct", "kvPctNum");
    syncPair("tsPct", "tsPctNum");
    syncPair("flashKb", "flashKbNum");
    syncPair("walThreshold", "walThresholdNum");

    el("preset").addEventListener("change", () => {
      const p = el("preset").value;
      if (p === "CUSTOM") { update(); return; }
      const v = profiles[p];
      Object.keys(v).forEach((k) => {
        const id = k === "ramKb" ? "ramKbNum" : k === "kvPct" ? "kvPctNum" : k === "tsPct" ? "tsPctNum" : k;
        if (el(id)) { el(id).value = v[k]; }
      });
      el("ramKb").value = v.ramKb;
      el("kvPct").value = v.kvPct;
      el("tsPct").value = v.tsPct;
      update();
    });

    ["ptrBits","ramKbNum","kvPctNum","tsPctNum","kvMaxKeys","kvKeyMaxLen","kvValMaxLen","txnStageKeys","tsMaxStreams","tsNameLen","relMaxTables","relMaxCols","storageEnabled","flashKbNum","eraseSize","walEnabled","walThresholdNum","kvOpsHr","tsOpsHr","relOpsHr","peCycles","targetYears"].forEach((id) => {
      el(id).addEventListener("input", update);
      el(id).addEventListener("change", update);
    });

    function kvBucketCount(entryLimit) {
      const required = Math.floor((entryLimit * 4 + 2) / 3);
      let buckets = 1;
      while (buckets < required) buckets <<= 1;
      return buckets;
    }

    function sizeofKvBucket(keyMaxLen) {
      // sizeof(microdb_kv_bucket_t) - from src/microdb_internal.h
      return align(8 + keyMaxLen, 4) + 16;
    }

    function sizeofTxnStage(keyMaxLen, valMaxLen, ptrBytes) {
      // sizeof(microdb_txn_stage_entry_t) - from src/microdb_internal.h
      let off = 0;
      off += keyMaxLen;
      off = align(off, ptrBytes);
      off += ptrBytes;
      off += ptrBytes;
      off += 4;
      off += 1;
      off += valMaxLen;
      return align(off, ptrBytes);
    }

    function sizeofTsStream(tsNameLen, ptrBytes) {
      // sizeof(microdb_ts_stream_t) - from src/microdb_internal.h
      let off = 0;
      off += tsNameLen;
      off += 4; // enum microdb_ts_type_t
      off = align(off, ptrBytes);
      off += ptrBytes; // size_t raw_size
      off += 20; // sample_stride/head/tail/count/capacity
      off = align(off, ptrBytes);
      off += ptrBytes; // buf pointer
      off += 1; // bool registered
      return align(off, ptrBytes);
    }

    function sizeofColDesc(ptrBytes) {
      // sizeof(microdb_col_desc_t) - from src/microdb_internal.h
      let off = 0;
      off += 16; // MICRODB_REL_COL_NAME_LEN default
      off += 4; // enum microdb_col_type_t
      off = align(off, ptrBytes);
      off += ptrBytes; // size_t size
      off += ptrBytes; // size_t offset
      off += 1; // bool is_index
      return align(off, ptrBytes);
    }

    function sizeofTable(relMaxCols, ptrBytes) {
      // sizeof(struct microdb_table_s) - from src/microdb_internal.h
      const colDesc = sizeofColDesc(ptrBytes);
      let off = 0;
      off += 16; // name
      off += 2;  // schema_version
      off = align(off, 4);
      off += colDesc * relMaxCols;
      off += 4; // col_count
      off += 4; // max_rows
      off = align(off, ptrBytes);
      off += ptrBytes; // row_size size_t
      off += 4; // index_col
      off = align(off, ptrBytes);
      off += ptrBytes; // index_key_size
      off += ptrBytes * 4; // rows/alive/index/order pointers
      off += 16; // live/index/order/mutation counts
      off += 1; // registered
      return align(off, ptrBytes);
    }

    function update() {
      const ptrBits = Number(el("ptrBits").value);
      const ptrBytes = ptrBits / 8;
      const ramKb = Number(el("ramKbNum").value);
      const kvPct = Number(el("kvPctNum").value);
      const tsPct = Number(el("tsPctNum").value);
      const relPct = Math.max(0, 100 - kvPct - tsPct);
      el("relPctNum").value = relPct;

      const kvMaxKeys = Number(el("kvMaxKeys").value);
      const kvKeyMaxLen = Number(el("kvKeyMaxLen").value);
      const kvValMaxLen = Number(el("kvValMaxLen").value);
      const txnStageKeys = Number(el("txnStageKeys").value);
      const tsMaxStreams = Number(el("tsMaxStreams").value);
      const tsNameLen = Number(el("tsNameLen").value);
      const relMaxTables = Number(el("relMaxTables").value);
      const relMaxCols = Number(el("relMaxCols").value);

      const totalBytes = ramKb * 1024;
      // (total * pct) / 100 - from src/microdb.c microdb_slice_bytes
      const kvArena = Math.floor(totalBytes * kvPct / 100);
      const tsArena = Math.floor(totalBytes * tsPct / 100);
      const cursorAfterKv = kvArena;
      // ts base aligned to sizeof(uint32_t) - from src/microdb.c
      const tsAlignWaste = align(cursorAfterKv, 4) - cursorAfterKv;
      const tsEnd = cursorAfterKv + tsAlignWaste + tsArena;
      // rel base aligned to sizeof(void*) - from src/microdb.c
      const relAlignWaste = align(tsEnd, ptrBytes) - tsEnd;
      const relArena = Math.max(0, totalBytes - (cursorAfterKv + tsAlignWaste + tsArena + relAlignWaste));

      const entryLimit = Math.max(0, kvMaxKeys - txnStageKeys);
      const buckets = kvBucketCount(Math.max(1, entryLimit));
      const kvBucketBytes = buckets * sizeofKvBucket(kvKeyMaxLen);
      const kvBucketAlignWaste = align(kvBucketBytes, 8) - kvBucketBytes;
      const txnStageBytes = txnStageKeys * sizeofTxnStage(kvKeyMaxLen, kvValMaxLen, ptrBytes);
      const kvValueStore = Math.max(0, kvArena - kvBucketBytes - kvBucketAlignWaste - txnStageBytes);

      const tsStreamDescBytes = tsMaxStreams * sizeofTsStream(tsNameLen, ptrBytes);
      const relTableDescBytes = relMaxTables * sizeofTable(relMaxCols, ptrBytes);

      const f32Stride = 8;
      const raw16Stride = 20;
      const f32SamplesPerStream = tsMaxStreams > 0 ? Math.floor(Math.floor(tsArena / tsMaxStreams) / f32Stride) : 0;
      const raw16SamplesPerStream = tsMaxStreams > 0 ? Math.floor(Math.floor(tsArena / tsMaxStreams) / raw16Stride) : 0;

      const tsOpsHr = Number(el("tsOpsHr").value);
      const insertsPerStreamHr = tsMaxStreams > 0 ? (tsOpsHr / tsMaxStreams) : 0;
      const f32RetentionHr = insertsPerStreamHr > 0 ? (f32SamplesPerStream / insertsPerStreamHr) : 0;
      const raw16RetentionHr = insertsPerStreamHr > 0 ? (raw16SamplesPerStream / insertsPerStreamHr) : 0;

      const storageEnabled = el("storageEnabled").value === "1";
      const walEnabled = el("walEnabled").value === "1";
      const flashBytes = Number(el("flashKbNum").value) * 1024;
      const eraseSize = Number(el("eraseSize").value);
      const walThreshold = Number(el("walThresholdNum").value);

      let kvSnap = 0, tsSnap = 0, relSnap = 0, bankSize = 0, walSize = 0, totalUsed = 0, remaining = 0;
      let compactionsHr = 0, compactionsYear = 0, pePerYear = 0, lifetimeYears = 0;
      let warn = "";

      if (storageEnabled) {
        // max_entries * (1 + max_key_len + 4 + max_val_len + 4) - from src/microdb_wal.c microdb_kv_snapshot_payload_max
        const maxKeyLen = kvKeyMaxLen > 0 ? (kvKeyMaxLen - 1) : 0;
        const perEntry = 1 + maxKeyLen + 4 + kvValMaxLen + 4;
        const kvPayloadMax = entryLimit * perEntry;
        kvSnap = align(kvPayloadMax + 32, eraseSize);
        tsSnap = align(tsArena + 32, eraseSize);
        relSnap = align(relArena + 32, eraseSize);
        bankSize = kvSnap + tsSnap + relSnap;

        const fixedBytes = eraseSize * 2;
        const needNoWal = fixedBytes + (bankSize * 2);
        const walTarget = eraseSize * 8;
        const walMin = eraseSize * 2;

        if (walEnabled && flashBytes >= needNoWal + walMin) {
          const maxWal = flashBytes - needNoWal;
          const maxWalAligned = Math.floor(maxWal / eraseSize) * eraseSize;
          walSize = Math.max(walMin, Math.min(walTarget, maxWalAligned));
        } else if (!walEnabled) {
          walSize = 0;
        }

        totalUsed = walSize + fixedBytes + (bankSize * 2);
        remaining = Math.max(0, flashBytes - totalUsed);

        const kvOpsHr = Number(el("kvOpsHr").value);
        const relOpsHr = Number(el("relOpsHr").value);
        const avgKeyLen = Math.min(Math.max(4, Math.floor(kvKeyMaxLen / 2)), kvKeyMaxLen - 1);
        const avgValLen = Math.max(1, Math.floor(kvValMaxLen / 2));
        const kvEntryBytes = 16 + align(1 + avgKeyLen + 4 + avgValLen + 4, 4);
        const tsEntryBytes = 16 + align(1 + Math.min(tsNameLen - 1, 8) + 4 + 4, 4);
        const relEntryBytes = 16 + align(32, 4);
        const walBytesHr = (kvOpsHr * kvEntryBytes) + (tsOpsHr * tsEntryBytes) + (relOpsHr * relEntryBytes);
        const compactTrigger = walSize > 0 ? (walSize - 32) * (walThreshold / 100) : 0;
        compactionsHr = compactTrigger > 0 ? (walBytesHr / compactTrigger) : 0;
        compactionsYear = compactionsHr * 24 * 365;

        const eraseBlocks = eraseSize > 0 ? (flashBytes / eraseSize) : 0;
        const erasesPerCompaction = eraseSize > 0 ? ((bankSize + walSize) / eraseSize) : 0;
        pePerYear = eraseBlocks > 0 ? (compactionsYear * erasesPerCompaction / eraseBlocks) : 0;
        const peCycles = Number(el("peCycles").value);
        lifetimeYears = pePerYear > 0 ? (peCycles / pePerYear) : 0;

        const targetYears = Number(el("targetYears").value);
        warn = (lifetimeYears > 0 && lifetimeYears < targetYears) ? `WARNING: estimated flash lifetime ${f2(lifetimeYears)} years is below target ${targetYears} years.` : "";
      }

      const ramCards = [
        ["Total RAM", `${fmt(totalBytes)} B`],
        ["KV arena", `${fmt(kvArena)} B`],
        ["TS arena", `${fmt(tsArena)} B`],
        ["REL arena", `${fmt(relArena)} B`],
        ["KV bucket array", `${fmt(kvBucketBytes)} B`],
        ["KV txn stage", `${fmt(txnStageBytes)} B`],
        ["KV value store", `${fmt(kvValueStore)} B`],
        ["Align waste", `${fmt(tsAlignWaste + relAlignWaste + kvBucketAlignWaste)} B`]
      ];
      el("ramCards").innerHTML = ramCards.map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

      el("ramDetail").textContent =
`KV: bucket_array=${kvBucketBytes}B, txn_stage=${txnStageBytes}B, value_store=${kvValueStore}B, alloc_align_waste=${kvBucketAlignWaste}B
TS: stream_descriptors(core)=${tsStreamDescBytes}B, ring_buffer_init=0B, arena=${tsArena}B
REL: table_descriptors(core)=${relTableDescBytes}B, row_store_init=0B, alive_bitmap_init=0B, index_array_init=0B, order_array_init=0B, arena=${relArena}B
Heap slicing: ts_align_waste=${tsAlignWaste}B, rel_align_waste=${relAlignWaste}B
Total model check: ${kvArena + tsAlignWaste + tsArena + relAlignWaste + relArena} / ${totalBytes} B`;

      const capCards = [
        ["KV usable keys", `${fmt(entryLimit)}`],
        ["KV value store total", `${fmt(kvValueStore)} B`],
        ["KV max single value", `${fmt(kvValMaxLen)} B`],
        ["KV avg bytes/key", entryLimit > 0 ? `${f2(kvValueStore / entryLimit)} B` : "0 B"],
        ["TS samples/stream F32", `${fmt(f32SamplesPerStream)}`],
        ["TS samples/stream RAW16", `${fmt(raw16SamplesPerStream)}`],
        ["TS retention F32", `${f2(f32RetentionHr)} h`],
        ["TS retention RAW16", `${f2(raw16RetentionHr)} h`]
      ];
      el("capCards").innerHTML = capCards.map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

      const storageCards = storageEnabled ? [
        ["WAL region", `${fmt(walSize)} B`],
        ["Superblock A+B", `${fmt(eraseSize * 2)} B`],
        ["Bank A", `${fmt(bankSize)} B`],
        ["Bank B", `${fmt(bankSize)} B`],
        ["Storage used", `${fmt(totalUsed)} B`],
        ["Storage remaining", `${fmt(remaining)} B`],
        ["Compactions/hour", `${f2(compactionsHr)}`],
        ["P/E cycles/year", `${f2(pePerYear)}`],
        ["Flash lifetime", `${f2(lifetimeYears)} years`]
      ] : [["Storage", "disabled"]];
      el("storageCards").innerHTML = storageCards.map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
      el("lifetimeWarn").textContent = warn;

      el("cmakeOut").textContent =
`target_compile_definitions(your_target PRIVATE
  MICRODB_RAM_KB=${ramKb}
  MICRODB_RAM_KV_PCT=${kvPct}
  MICRODB_RAM_TS_PCT=${tsPct}
  MICRODB_RAM_REL_PCT=${relPct}
  MICRODB_KV_MAX_KEYS=${kvMaxKeys}
  MICRODB_KV_KEY_MAX_LEN=${kvKeyMaxLen}
  MICRODB_KV_VAL_MAX_LEN=${kvValMaxLen}
  MICRODB_TXN_STAGE_KEYS=${txnStageKeys}
  MICRODB_TS_MAX_STREAMS=${tsMaxStreams}
  MICRODB_TS_STREAM_NAME_LEN=${tsNameLen}
  MICRODB_REL_MAX_TABLES=${relMaxTables}
  MICRODB_REL_MAX_COLS=${relMaxCols}
  MICRODB_WAL_COMPACT_THRESHOLD_PCT=${walThreshold}
)`;
    }

    update();
  </script>
</body>
</html>
