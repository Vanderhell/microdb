name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sanitize-release-linux:
    name: Release sanitizer gate (ASan/UBSan Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure (ASan/UBSan)
        run: cmake --preset ci-asan-ubsan-linux
      - name: Build (ASan/UBSan)
        run: cmake --build --preset ci-asan-ubsan-linux
      - name: Test (ASan/UBSan)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --preset ci-asan-ubsan-linux --output-on-failure --stop-on-failure -V

  build-release:
    name: ${{ matrix.label }}
    needs: sanitize-release-linux
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            archive_ext: tar.gz
            configure_preset: release-linux
            build_preset: release-linux
            test_preset: release-linux
            build_dir: build/release-linux
          - os: windows-latest
            label: windows-x64
            archive_ext: zip
            configure_preset: release-windows
            build_preset: release-windows
            test_preset: release-windows
            build_dir: build/release-windows
          - os: macos-latest
            label: macos-arm64
            archive_ext: tar.gz
            configure_preset: release-macos
            build_preset: release-macos
            test_preset: release-macos
            build_dir: build/release-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Test
        run: ctest --preset ${{ matrix.test_preset }}

      - name: Install
        run: cmake --install ${{ matrix.build_dir }} --config Release --prefix stage/loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}

      - name: Package archive (Linux)
        if: runner.os == 'Linux'
        working-directory: stage
        run: tar -czf loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }} loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: stage
        run: Compress-Archive -Path loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }} -DestinationPath loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}

      - name: Generate checksum (Linux)
        if: runner.os == 'Linux'
        working-directory: stage
        run: sha256sum loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }} > loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: stage
        run: |
          $name = "loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}"
          $hash = (Get-FileHash $name -Algorithm SHA256).Hash.ToLower()
          "$hash  $name" | Out-File -FilePath "$name.sha256" -Encoding ascii

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            stage/loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}
            stage/loxdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}.sha256

  publish-release:
    name: Publish GitHub Release
    needs: [build-release, sanitize-release-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "Missing required secret: GPG_PRIVATE_KEY" >&2
            exit 1
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Sign SHA256 files
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_KEY_ID}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "Missing required secrets: GPG_KEY_ID and/or GPG_PASSPHRASE" >&2
            exit 1
          fi
          find release-assets -type f -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${GPG_PASSPHRASE}" \
              --local-user "${GPG_KEY_ID}" \
              --armor --detach-sign \
              --output "${f}.asc" "${f}"
          done

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
            release-assets/**/*.sha256.asc
