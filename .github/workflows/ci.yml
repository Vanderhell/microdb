name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  boundary-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boundary Rules Check
        shell: pwsh
        run: ./tools/check_boundary_rules.ps1

  spdx-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: SPDX Header Check
        shell: pwsh
        run: ./tools/check_spdx_headers.ps1

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: ci-debug-linux
          - os: windows-latest
            preset: ci-debug-windows
          - os: macos-latest
            preset: ci-debug-macos
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }}
      - name: Verifier integration smoke
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake --build --preset ${{ matrix.preset }} --target lox_verify
          ctest --preset ${{ matrix.preset }} -R test_offline_verifier -V

  sanitize-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure (ASan/UBSan)
        run: cmake --preset ci-asan-ubsan-linux
      - name: Build (ASan/UBSan)
        run: cmake --build --preset ci-asan-ubsan-linux
      - name: Test (ASan/UBSan)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --preset ci-asan-ubsan-linux --output-on-failure --stop-on-failure -V

  static-analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run static analysis
        run: bash scripts/run_static_analysis.sh
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report
          path: docs/results/cppcheck_report.txt

  static-analysis-style:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run style analysis (non-blocking)
        run: bash scripts/run_static_analysis_style.sh
      - name: Upload style report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-style-report
          path: docs/results/cppcheck_style_report.txt

  clang-tidy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy
      - name: Configure (compile_commands.json)
        run: cmake -S . -B build/ci-clang-tidy-linux -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy (non-blocking)
        run: |
          clang-tidy -p build/ci-clang-tidy-linux \
            src/*.c port/posix/*.c port/ram/*.c \
            --quiet \
            | tee clang-tidy-report.txt
      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt

  coverage-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Configure (coverage)
        run: cmake --preset ci-coverage-linux
      - name: Build (coverage)
        run: cmake --build --preset ci-coverage-linux
      - name: Test (coverage)
        run: ctest --preset ci-coverage-linux
      - name: Capture coverage (lcov)
        run: |
          lcov --capture --directory build/ci-coverage-linux --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/build/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.info
