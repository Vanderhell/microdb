name: Nightly Soak

on:
  schedule:
    - cron: "0 1 * * 0"
  workflow_dispatch:

jobs:
  soak:
    name: ${{ matrix.label }}-${{ matrix.profile }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-debug
            configure_preset: ci-debug-linux
            build_preset: ci-debug-linux
            exe_dir: build/ci-debug-linux
            exe_ext: ""
            ops: 450000
            profile: deterministic
          - os: ubuntu-latest
            label: linux-debug
            configure_preset: ci-debug-linux
            build_preset: ci-debug-linux
            exe_dir: build/ci-debug-linux
            exe_ext: ""
            ops: 450000
            profile: balanced
          - os: ubuntu-latest
            label: linux-debug
            configure_preset: ci-debug-linux
            build_preset: ci-debug-linux
            exe_dir: build/ci-debug-linux
            exe_ext: ""
            ops: 450000
            profile: stress
          - os: windows-latest
            label: windows-debug
            configure_preset: ci-debug-windows
            build_preset: ci-debug-windows
            exe_dir: build/ci-debug-windows/Debug
            exe_ext: ".exe"
            ops: 450000
            profile: deterministic
          - os: windows-latest
            label: windows-debug
            configure_preset: ci-debug-windows
            build_preset: ci-debug-windows
            exe_dir: build/ci-debug-windows/Debug
            exe_ext: ".exe"
            ops: 450000
            profile: balanced
          - os: windows-latest
            label: windows-debug
            configure_preset: ci-debug-windows
            build_preset: ci-debug-windows
            exe_dir: build/ci-debug-windows/Debug
            exe_ext: ".exe"
            ops: 450000
            profile: stress

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build soak binaries
        run: cmake --build --preset ${{ matrix.build_preset }} --target soak_runner worstcase_matrix_runner

      - name: Run worstcase matrix
        shell: pwsh
        timeout-minutes: 30
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $runner = Join-Path "${{ matrix.exe_dir }}" ("worstcase_matrix_runner${{ matrix.exe_ext }}")
          if (-not (Test-Path $runner)) {
            throw "Runner binary not found: $runner"
          }
          & $runner --profile "${{ matrix.profile }}" 2>&1 |
            Tee-Object -FilePath ("artifacts/worstcase_matrix_{0}.csv" -f "${{ matrix.profile }}")

      - name: Run long soak
        shell: pwsh
        timeout-minutes: 180
        run: |
          $runner = Join-Path "${{ matrix.exe_dir }}" ("soak_runner${{ matrix.exe_ext }}")
          if (-not (Test-Path $runner)) {
            throw "Runner binary not found: $runner"
          }
          & $runner --profile "${{ matrix.profile }}" --ops ${{ matrix.ops }} 2>&1 |
            Tee-Object -FilePath ("artifacts/soak_{0}.csv" -f "${{ matrix.profile }}")

      - name: Upload soak artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-soak-${{ matrix.label }}-${{ matrix.profile }}
          path: artifacts/*
